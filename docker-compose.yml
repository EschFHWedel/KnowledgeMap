services:
  # ---------------------------------------------------------------------------
  # Standard-Versatzstücke
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5
    container_name: km-neo4j
    ports:
      - "7474:7474"   # Browser-UI
      - "7687:7687"   # Bolt-Protokoll
    environment:
      NEO4J_AUTH: "neo4j/knowledgemap"
    volumes:
      - neo4j-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: km-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "knowledgemap-dev-key"
      MEILI_ENV: "development"
    volumes:
      - meili-data:/meili_data

  # ---------------------------------------------------------------------------
  # Eigene Services
  # ---------------------------------------------------------------------------
  graph-service:
    build: ./services/graph-service
    container_name: km-graph-service
    ports:
      - "8081:8081"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "knowledgemap"
    depends_on:
      - neo4j

  # search-service:
  #   build: ./services/search-service
  #   container_name: km-search-service
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     MEILI_URL: "http://meilisearch:7700"
  #     MEILI_KEY: "knowledgemap-dev-key"
  #   depends_on:
  #     - meilisearch

volumes:
  neo4j-data:
  meili-data:
